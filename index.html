<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SoLaNail | Professional Beauty Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;700;900&family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #0a0a0a; 
            color: #ffffff;
            overflow-x: hidden;
        }
        .font-accent { font-family: 'Unbounded', sans-serif; }
        
        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(330,100%,15%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(280,100%,15%,1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(340,100%,10%,1) 0, transparent 50%);
            background-color: #050505;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
        }

        .iphone-tab-bar {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: env(safe-area-inset-bottom);
        }

        [x-cloak] { display: none !important; }
        
        .active-cat {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .product-image-container {
            position: relative;
            overflow: hidden;
            border-radius: 1.5rem;
        }
        
        .product-image-container img {
            transition: transform 0.8s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .product-card:hover img {
            transform: scale(1.1);
        }
    </style>
</head>
<body x-data="shopData()" class="antialiased">

    <div class="mesh-gradient"></div>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 px-6 py-6 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-card px-8 py-4">
            <div class="text-xl font-black font-accent tracking-tighter uppercase text-white">
                SoLa<span class="text-pink-500">Nail</span>
            </div>
            <div class="hidden md:flex space-x-8 text-[10px] uppercase font-bold tracking-widest text-gray-400">
                <a href="#catalog" class="hover:text-white transition">Каталог</a>
                <a href="#about" class="hover:text-white transition">О нас</a>
                <a href="#wholesale" class="hover:text-white transition">ОПТ</a>
            </div>
            <button @click="cartOpen = true" class="relative group p-2">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-white">
                    <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span x-show="cartCount > 0" x-text="cartCount" class="absolute -top-1 -right-1 bg-pink-500 text-white text-[9px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-black"></span>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="min-h-screen flex flex-col justify-center items-center px-6 pt-20 text-center">
        <div class="inline-block px-4 py-1.5 rounded-full bg-pink-500/10 border border-pink-500/20 text-pink-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-8">
            Est. 2026 • Professional Quality
        </div>
        <h1 class="text-5xl md:text-8xl font-black font-accent leading-none tracking-tighter mb-8 text-white">
            CHROME <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 italic">ETERNITY</span>
        </h1>
        <p class="max-w-lg text-gray-400 text-sm md:text-lg font-medium leading-relaxed mb-12">
            Революционные материалы для нейл-арта. Мы создаем стандарты, которым следуют остальные.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
            <a href="#catalog" class="bg-white text-black px-12 py-5 rounded-full font-black text-xs uppercase tracking-widest hover:bg-pink-500 hover:text-white transition-all duration-300">
                Купить сейчас
            </a>
            <a href="#wholesale" class="glass-card border-white/10 px-12 py-5 text-white font-bold text-xs uppercase tracking-widest hover:border-pink-500/50 transition">
                Стать партнером
            </a>
        </div>
    </section>

    <!-- Catalog -->
    <section id="catalog" class="py-32 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-8">
                <div>
                    <h2 class="text-4xl md:text-6xl font-black font-accent tracking-tighter text-white mb-4 italic">KOLLEKTION</h2>
                    <div class="h-1 w-20 bg-pink-500"></div>
                </div>
                <div class="flex space-x-2 overflow-x-auto pb-4 no-scrollbar w-full md:w-auto">
                    <template x-for="cat in categories">
                        <button 
                            @click="filter = cat"
                            class="px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest transition-all border border-white/5 whitespace-nowrap"
                            :class="filter === cat ? 'active-cat' : 'bg-white/5 text-gray-500 hover:text-white'"
                            x-text="cat"
                        ></button>
                    </template>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">
                <template x-for="product in filteredProducts" :key="product.id">
                    <div class="product-card glass-card p-4 group">
                        <div class="product-image-container aspect-[4/5] bg-neutral-900 shadow-2xl">
                            <img :src="product.image" class="w-full h-full object-cover opacity-90 group-hover:opacity-100" 
                                 onerror="this.src='https://images.unsplash.com/photo-1604654894610-df4906687103?q=80&w=800&auto=format&fit=crop'">
                            <div class="absolute top-6 left-6">
                                <span class="bg-black/50 backdrop-blur-md px-4 py-1.5 rounded-lg text-[8px] font-black uppercase tracking-[0.2em] text-pink-500 border border-pink-500/20" x-text="product.category"></span>
                            </div>
                        </div>
                        <div class="p-6 pt-8">
                            <h3 class="text-xl font-extrabold mb-3 text-white tracking-tight" x-text="product.name"></h3>
                            <p class="text-gray-500 text-xs leading-relaxed mb-8 h-8 overflow-hidden" x-text="product.description"></p>
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-black text-gray-400 uppercase tracking-widest">In Stock</span>
                                <button @click="addToCart(product)" class="bg-pink-600 text-white p-4 rounded-2xl hover:bg-white hover:text-black transition-colors shadow-lg shadow-pink-500/20 active:scale-90">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- Cart Drawer -->
    <div x-show="cartOpen" x-cloak class="fixed inset-0 z-[100] flex justify-end">
        <div x-show="cartOpen" x-transition:enter="transition-opacity duration-500" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="cartOpen = false"></div>
        <div x-show="cartOpen" x-transition:enter="transition transform duration-500 cubic-bezier(0.16, 1, 0.3, 1)" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" class="relative w-full max-w-lg bg-[#0a0a0a] border-l border-white/10 h-full flex flex-col">
            <div class="p-10 border-b border-white/5 flex justify-between items-center">
                <h2 class="text-3xl font-black font-accent italic">BAG</h2>
                <button @click="cartOpen = false" class="text-gray-500 hover:text-white transition">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-10 space-y-10">
                <template x-if="cart.length === 0">
                    <div class="h-full flex flex-col items-center justify-center text-gray-700">
                        <p class="font-accent font-black text-xs uppercase tracking-[0.4em]">Empty Space</p>
                    </div>
                </template>
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex items-center space-x-6 animate-fadeIn">
                        <div class="w-24 h-24 rounded-2xl overflow-hidden border border-white/10 p-1">
                            <img :src="item.image" class="w-full h-full object-cover rounded-xl grayscale hover:grayscale-0 transition-all duration-500">
                        </div>
                        <div class="flex-1">
                            <h4 class="font-black text-white text-sm" x-text="item.name"></h4>
                            <p class="text-[9px] text-pink-500 font-bold uppercase mt-1 tracking-widest" x-text="item.category"></p>
                        </div>
                        <button @click="removeFromCart(index)" class="text-gray-600 hover:text-red-500 transition">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </template>
            </div>
            <div class="p-10 bg-white/5 border-t border-white/5" x-show="cart.length > 0">
                <div class="space-y-6 mb-10">
                    <input type="text" x-model="orderForm.name" placeholder="ВАШЕ ИМЯ" class="w-full bg-black border border-white/10 rounded-xl p-5 text-xs font-black tracking-widest text-white focus:border-pink-500 outline-none uppercase">
                    <input type="text" x-model="orderForm.phone" placeholder="КОНТАКТНЫЙ ТЕЛЕФОН" class="w-full bg-black border border-white/10 rounded-xl p-5 text-xs font-black tracking-widest text-white focus:border-pink-500 outline-none uppercase">
                </div>
                <button @click="sendOrder()" class="w-full bg-white text-black py-6 rounded-full text-[10px] font-black uppercase tracking-[0.3em] hover:bg-pink-500 hover:text-white transition-all active:scale-95 disabled:opacity-50" :disabled="submitting">
                    <span x-show="!submitting">ОФОРМИТЬ В TELEGRAM</span>
                    <span x-show="submitting" class="animate-pulse">ОТПРАВКА...</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <div class="md:hidden fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] z-[60]">
        <nav class="iphone-tab-bar rounded-[2.5rem] border border-white/10 shadow-2xl flex justify-around items-center p-5">
            <a href="#" class="p-2 text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg></a>
            <a href="#catalog" class="p-2 text-gray-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></a>
            <button @click="cartOpen = true" class="relative p-2 text-gray-500">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span x-show="cartCount > 0" class="absolute top-1 right-1 bg-pink-500 w-2.5 h-2.5 rounded-full border-2 border-black"></span>
            </button>
        </nav>
    </div>

    <script>
        function shopData() {
            return {
                filter: 'Все',
                categories: ['Все', 'Гели', 'Инструменты', 'Декор', 'Аксессуары'],
                products: [
                    {id: 1, name: "Staleks Expert 10", description: "Инструмент из хирургической стали. Эталон точности.", category: "Инструменты", image: "https://images.unsplash.com/photo-1522338242992-e1a54906a8da?q=80&w=800&auto=format&fit=crop"},
                    {id: 2, name: "Sakyra Builder Gel", description: "Гель с золотой поталью. Идеальный блик.", category: "Гели", image: "https://images.unsplash.com/photo-1607779097040-26e80aa78e66?q=80&w=800&auto=format&fit=crop"},
                    {id: 3, name: "Avrora Chrome Polish", description: "Зеркальный эффект за 30 секунд. Магия на ногтях.", category: "Гели", image: "https://images.unsplash.com/photo-1632345031435-8727f6897d53?q=80&w=800&auto=format&fit=crop"},
                    {id: 4, name: "Pandora Magic Cat", description: "Глубокий 5D магнитный эффект. Космический дизайн.", category: "Гели", image: "https://images.unsplash.com/photo-1634712282287-14ed57b9cc89?q=80&w=800&auto=format&fit=crop"},
                    {id: 5, name: "Design Sliders 2026", description: "Ультратонкие наклейки. Не ощутимы на ногте.", category: "Декор", image: "https://images.unsplash.com/photo-1604654894610-df4906687103?q=80&w=800&auto=format&fit=crop"},
                    {id: 6, name: "Crystal Accessory", description: "Эксклюзивные расчески со стразами ручной работы.", category: "Аксессуары", image: "https://images.unsplash.com/photo-1595425283999-e9d739d7fc4f?q=80&w=800&auto=format&fit=crop"}
                ],
                cart: [],
                cartOpen: false,
                submitting: false,
                orderForm: { name: '', phone: '' },
                get filteredProducts() {
                    return this.filter === 'Все' ? this.products : this.products.filter(p => p.category === this.filter);
                },
                get cartCount() { return this.cart.length; },
                addToCart(product) {
                    this.cart.push(product);
                    this.cartOpen = true;
                },
                removeFromCart(index) {
                    this.cart.splice(index, 1);
                },
                async sendOrder() {
                    if (!this.orderForm.name || !this.orderForm.phone) { alert('ЗАПОЛНИТЕ ДАННЫЕ'); return; }
                    this.submitting = true;
                    try {
                        const res = await fetch('https://serenkiy.store/webhook-test/re-leads', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: this.orderForm.name, phone: this.orderForm.phone, items: this.cart.map(i => i.name) })
                        });
                        if (res.ok) { alert('ЗАКАЗ ПРИНЯТ'); this.cart = []; this.cartOpen = false; }
                        else { alert('ОШИБКА ОТПРАВКИ'); }
                    } catch (e) { alert('ОШИБКА СЕТИ'); } finally { this.submitting = false; }
                }
            }
        }
    </script>
</body>
</html>
