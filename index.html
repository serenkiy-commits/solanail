<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SoLaNail | Профессиональные материалы для красоты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #000000; 
            color: #ffffff;
            overflow-x: hidden;
        }
        
        /* Гарантированный темный фон через градиент, который не может быть белым */
        .main-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a050a 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }

        [x-cloak] { display: none !important; }
        
        .active-filter {
            background: #ec4899 !important; /* Розовый */
            color: #ffffff !important;
            border-color: #ec4899 !important;
        }

        .iphone-nav {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body x-data="shopData()" class="antialiased text-white">

    <div class="main-bg"></div>

    <!-- Шапка -->
    <header class="fixed top-0 w-full z-50 px-4 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center glass-card px-6 py-4">
            <div class="text-xl font-extrabold tracking-tighter uppercase">
                SoLa<span class="text-pink-500">Nail</span>
            </div>
            <button @click="cartOpen = true" class="relative p-2 bg-white/10 rounded-xl">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span x-show="cartCount > 0" x-text="cartCount" class="absolute -top-1 -right-1 bg-pink-500 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full"></span>
            </button>
        </div>
    </header>

    <!-- Главный блок -->
    <section class="min-h-screen flex flex-col justify-center items-center px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold leading-tight mb-6">
            Твоя <br> <span class="text-pink-500">Идеальная</span> Работа
        </h1>
        <p class="max-w-md text-gray-400 text-lg mb-10">
            Профессиональные материалы SoLaNail. Качество, которое вдохновляет мастеров.
        </p>
        <div class="flex flex-col gap-4 w-full max-w-xs">
            <a href="#catalog" class="bg-white text-black py-4 rounded-2xl font-bold uppercase tracking-widest text-xs hover:bg-pink-500 hover:text-white transition">
                Смотреть каталог
            </a>
        </div>
    </section>

    <!-- Каталог -->
    <section id="catalog" class="py-20 px-4">
        <div class="max-w-5xl mx-auto">
            <h2 class="text-3xl font-bold mb-10">Каталог</h2>
            
            <!-- Фильтры -->
            <div class="flex space-x-2 overflow-x-auto pb-6 mb-10 no-scrollbar">
                <template x-for="cat in categories">
                    <button 
                        @click="filter = cat"
                        class="px-6 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest border border-white/10 transition-all whitespace-nowrap"
                        :class="filter === cat ? 'active-filter' : 'bg-white/5 text-gray-400'"
                        x-text="cat"
                    ></button>
                </template>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <template x-for="product in filteredProducts" :key="product.id">
                    <div class="glass-card p-4 flex flex-col">
                        <div class="aspect-square rounded-xl overflow-hidden mb-4 bg-neutral-900">
                            <img :src="product.image" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1604654894610-df4906687103?q=80&w=500&auto=format&fit=crop'">
                        </div>
                        <h3 class="text-lg font-bold mb-2" x-text="product.name"></h3>
                        <p class="text-gray-500 text-xs mb-6 flex-grow" x-text="product.description"></p>
                        <div class="flex justify-between items-center mt-auto">
                            <span class="font-bold text-pink-500 text-sm">В наличии</span>
                            <button @click="addToCart(product)" class="bg-pink-600 p-3 rounded-xl hover:bg-white hover:text-black transition">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- Оптовый блок -->
    <section id="wholesale" class="py-20 px-6 bg-white/5 rounded-[3rem] mx-4 mb-32 border border-white/5">
        <div class="max-w-2xl mx-auto text-center">
            <h2 class="text-3xl font-bold mb-6">Оптовые продажи</h2>
            <p class="text-gray-400 mb-10">Специальные условия для студий и магазинов. Напишите нам для получения прайса.</p>
            <a href="https://t.me/Solanail23" class="inline-block bg-pink-600 px-10 py-4 rounded-2xl font-bold uppercase tracking-widest text-xs">Написать менеджеру</a>
        </div>
    </section>

    <!-- Корзина -->
    <div x-show="cartOpen" x-cloak class="fixed inset-0 z-[100] flex justify-end">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" @click="cartOpen = false"></div>
        <div class="relative w-full max-w-md bg-black h-full flex flex-col border-l border-white/10">
            <div class="p-8 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-2xl font-bold uppercase italic">Корзина</h2>
                <button @click="cartOpen = false" class="text-gray-500">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-6">
                <template x-if="cart.length === 0">
                    <p class="text-center text-gray-600 mt-20">Ваша корзина пуста</p>
                </template>
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex items-center space-x-4 bg-white/5 p-3 rounded-2xl">
                        <img :src="item.image" class="w-16 h-16 object-cover rounded-lg">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm" x-text="item.name"></h4>
                            <p class="text-[10px] text-pink-500 uppercase" x-text="item.category"></p>
                        </div>
                        <button @click="removeFromCart(index)" class="text-gray-600">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                </template>
            </div>
            <div class="p-8 bg-white/5 border-t border-white/10" x-show="cart.length > 0">
                <div class="space-y-4 mb-8">
                    <input type="text" x-model="orderForm.name" placeholder="ВАШЕ ИМЯ" class="w-full bg-black border border-white/10 rounded-xl p-4 text-xs font-bold text-white focus:border-pink-500 outline-none">
                    <input type="text" x-model="orderForm.phone" placeholder="ТЕЛЕФОН" class="w-full bg-black border border-white/10 rounded-xl p-4 text-xs font-bold text-white focus:border-pink-500 outline-none">
                </div>
                <button @click="sendOrder()" class="w-full bg-white text-black py-5 rounded-2xl font-bold uppercase text-[10px] tracking-widest hover:bg-pink-500 hover:text-white transition" :disabled="submitting">
                    <span x-show="!submitting">Оформить заказ</span>
                    <span x-show="submitting">Отправка...</span>
                </button>
            </div>
        </div>
    </div>

    <!-- iPhone Навигация -->
    <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] z-[60]">
        <nav class="iphone-nav rounded-[2rem] border border-white/10 shadow-2xl flex justify-around items-center p-4">
            <a href="#" class="p-2 text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg></a>
            <a href="#catalog" class="p-2 text-gray-500"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></a>
            <button @click="cartOpen = true" class="relative p-2 text-gray-500">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span x-show="cartCount > 0" class="absolute top-1 right-1 bg-pink-500 w-2 h-2 rounded-full border border-black"></span>
            </button>
        </nav>
    </div>

    <script>
        function shopData() {
            return {
                filter: 'Все',
                categories: ['Все', 'Гели', 'Инструменты', 'Декор', 'Аксессуары'],
                products: [
                    {id: 1, name: "Инструменты Staleks", description: "Профессиональные кусачки и ножницы Staleks. Эталон точности.", category: "Инструменты", image: "https://images.unsplash.com/photo-1522338242992-e1a54906a8da?q=80&w=800&auto=format&fit=crop"},
                    {id: 2, name: "Гель Sakyra", description: "Гель с поталью. Идеальное самовыравнивание.", category: "Гели", image: "https://images.unsplash.com/photo-1607779097040-26e80aa78e66?q=80&w=800&auto=format&fit=crop"},
                    {id: 3, name: "Avrora Collection", description: "Гель-лаки с эффектом зеркальной втирки.", category: "Гели", image: "https://images.unsplash.com/photo-1632345031435-8727f6897d53?q=80&w=800&auto=format&fit=crop"},
                    {id: 4, name: "Pandora Cat Eye", description: "Магнитный гель-лак Кошачий глаз.", category: "Гели", image: "https://images.unsplash.com/photo-1634712282287-14ed57b9cc89?q=80&w=800&auto=format&fit=crop"},
                    {id: 5, name: "Декор и Слайдеры", description: "Трендовые наклейки для быстрого дизайна.", category: "Декор", image: "https://images.unsplash.com/photo-1604654894610-df4906687103?q=80&w=800&auto=format&fit=crop"},
                    {id: 6, name: "Аксессуары со стразами", description: "Стильные аксессуары для вашего пространства.", category: "Аксессуары", image: "https://images.unsplash.com/photo-1595425283999-e9d739d7fc4f?q=80&w=800&auto=format&fit=crop"}
                ],
                cart: [],
                cartOpen: false,
                submitting: false,
                orderForm: { name: '', phone: '' },
                get filteredProducts() {
                    return this.filter === 'Все' ? this.products : this.products.filter(p => p.category === this.filter);
                },
                get cartCount() { return this.cart.length; },
                addToCart(product) { this.cart.push(product); this.cartOpen = true; },
                removeFromCart(index) { this.cart.splice(index, 1); },
                async sendOrder() {
                    if (!this.orderForm.name || !this.orderForm.phone) { alert('Заполните данные'); return; }
                    this.submitting = true;
                    try {
                        const res = await fetch('https://serenkiy.store/webhook-test/re-leads', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: this.orderForm.name, phone: this.orderForm.phone, items: this.cart.map(i => i.name) })
                        });
                        if (res.ok) { alert('Заказ отправлен!'); this.cart = []; this.cartOpen = false; }
                        else { alert('Ошибка отправки'); }
                    } catch (e) { alert('Ошибка сети'); } finally { this.submitting = false; }
                }
            }
        }
    </script>
</body>
</html>
